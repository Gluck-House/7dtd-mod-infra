name: reusable-release-please

on:
  workflow_call:
    inputs:
      config_file:
        required: false
        type: string
        default: .github/release-please-config.json
      manifest_file:
        required: false
        type: string
        default: .github/release-please-manifest.json
      runner_label:
        required: false
        type: string
        default: ubuntu-latest
    outputs:
      release_created:
        description: Whether a root release was created
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: Tag name created for the root release
        value: ${{ jobs.release-please.outputs.tag_name }}
      prs_created:
        description: Whether a release PR was created or updated
        value: ${{ jobs.release-please.outputs.prs_created }}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: reusable-release-please-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ${{ inputs.runner_label }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: ${{ inputs.config_file }}
          manifest-file: ${{ inputs.manifest_file }}
