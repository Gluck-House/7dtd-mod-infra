name: update-managed-template

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      template_id:
        description: Template id from config/managed-templates.yml, or all
        required: true
        default: all
      repo:
        description: Target repo in owner/name form, or all
        required: true
        default: all
      template_ref:
        description: Optional override ref, tag, or SHA. Leave blank to use the manifest version.
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: update-managed-template
  cancel-in-progress: false

env:
  TEMPLATE_ID: ${{ github.event.inputs.template_id || 'all' }}
  TARGET_REPO: ${{ github.event.inputs.repo || 'all' }}
  TEMPLATE_REF_OVERRIDE: ${{ github.event.inputs.template_ref || '' }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      template_id: ${{ steps.plan.outputs.template_id }}
      template_src: ${{ steps.plan.outputs.template_src }}
      template_ref: ${{ steps.plan.outputs.template_ref }}
      repo_count: ${{ steps.plan.outputs.repo_count }}
    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7

      - name: Build target matrix
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          uv run --with pyyaml python scripts/render_template_update_matrix.py \
            config/managed-templates.yml \
            "${{ env.TEMPLATE_ID }}" \
            "${{ env.TARGET_REPO }}" \
            "${{ env.TEMPLATE_REF_OVERRIDE }}"

  update:
    needs: plan
    if: needs.plan.outputs.repo_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7

      - name: Apply Copier update and open PR
        shell: bash
        env:
          MANAGED_REPOS_TOKEN: ${{ secrets.MANAGED_REPOS_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/update_managed_repo.sh \
            "${{ matrix.repo }}" \
            "${{ matrix.branch }}" \
            "${{ matrix.template_id }}" \
            "${{ matrix.template_src }}" \
            "${{ matrix.template_ref }}"
